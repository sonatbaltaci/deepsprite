name: multilayer
n_sprites: 10
n_backgrounds: 1
inject_noise: 0.4
prototype:
  source: data 
  data:
    freeze: [False, False, False]
    value: [0.9, 0., 0.]
    init: ["constant", "mean", "gaussian"]
    gaussian_weights_std: 8 
