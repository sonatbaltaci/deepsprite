name: multilayer
n_sprites: 10
n_backgrounds: 1
inject_noise: 0.4
prototype:
  source: generator
  generator: mlp
  data:
    freeze: [0, 0, 10]
    value: [0.9, 0., 0.]
    init: ["constant", "mean", "gaussian"]
    gaussian_weights_std: 8 
init_latent_linear: gaussian
init_bkg_linear: mean
encoder_name: resnet32 
transformation_sequence: color_projective_tps
transformation_sequence_bkg: color_projective_tps
curriculum_learning: [40, 70]
curriculum_learning_bkg: [40, 70]
curriculum_learning_layer: False
reassign_cluster: False
proba: True
proba_weighting: tr_sprite
proba_type: linear
estimate_minimum: False
empty_cluster_threshold: 0.05
